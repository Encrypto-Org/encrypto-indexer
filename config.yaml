name: encrypto-indexer
description: Encrypto's own indexer for USDC/USDT Transfer events + native gas balances across our 8 supported EVM chains. Powers instant balance + tx history for Encrypto Wallet, MetaMask, Phantom, and any other wallet a user links.
contracts:
  - name: USDC
    handler: src/handlers/UsdcHandler.ts
    events:
      - event: Transfer(address indexed from, address indexed to, uint256 value)
  - name: USDT
    handler: src/handlers/UsdtHandler.ts
    events:
      - event: Transfer(address indexed from, address indexed to, uint256 value)

# Per Envio schema: when neither `rpc` nor `hypersync_config` is provided
# for a chain Envio supports, HyperSync is the default data source. RPC
# mode (which would've taken "over 56 years" to backfill on the free
# Development plan) is only used when explicitly configured. Removing
# the earlier hand-rolled hypersync_config URLs lets Envio pick the
# canonical endpoint for each chain automatically.
#
# start_block ~1 day back from May 12 2026 14:30 UTC for each chain.
chains:
